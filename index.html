<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Sign-up</title>
</head>

<body>
    <div class="left">
        <img src="./photo-1607018244619-dab6235709dd.avif" alt="">
        <div class="logo">
            <p>Pizza</p>
        </div>
    </div>
    <div class="right">
        <div class="right-container">
            <div class="info">
                <p>This is not a real online service! You know you need something like this in your life
                    to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>
            <div>
                <p>Let's do this!</p>
                <form action="">
                    <div class="row-1">
                        <div>
                            <label for="first_name">FIRST NAME</label>
                            <input type="text" name="first_name" id="first_name">
                        </div>
                        <div>
                            <label for="last_name">LAST NAME</label>
                            <input type="text" name="last_name" id="last_name">
                        </div>
                    </div>

                    <div class="row-2">
                        <div>
                            <label for="email">EMAIL</label>
                            <input type="text" name="email" id="email">
                        </div>
                        <div>
                            <label for="phone">PHONE NUMBER</label>
                            <input type="text" name="phone" id="phone">
                        </div>
                    </div>

                    <div class="row-3">
                        <div>
                            <label for="password">PASSWORD</label>
                            <input type="text" name="password" id="password">
                        </div>
                        <div>
                            <label for="confirm-password">CONFIRM PASSWORD</label>
                            <input type="text" name="confirm-password" id="confirm-password">
                        </div>
                    </div>
                    <button>Create Account</button>
                </form>
                <div class="log-in">
                    <p>Already have an account? <a href="">Log in</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
